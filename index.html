<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050508">
    <title>Cosmic Focus</title>
    
    <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjogIkNvc21pYyBGb2N1cyBFbmdpbmUiLCJzaG9ydF9uYW1lIjogIkZvY3VzIiwic3RhcnRfdXJsIjogIi4iLCJkaXNwbGF5IjogInN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwNTA1MDgiLCJ0aGVtZV9jb2xvciI6ICIjMDUwNTA4IiwiaWNvbnMiOiBbeyJzcmMiOiAiaHR0cHM6Ly9jZG4taWNvbnMtcG5nLmZsYXRpY29uLmNvbS81MTIvMzE5NS8zMTk1NzAzLnBuZyIsInNpemVzIjogIjUxMng1MTIiLCJ0eXBlIjogImltYWdlL3BuZyJ9XX0=">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@500;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root { 
            --bg: #050508; 
            --surface: rgba(20, 20, 25, 0.90); 
            --text: #ffffff; 
            --text-muted: #a1a1aa; 
            --sand: #fbbf24; 
            --border: rgba(255, 255, 255, 0.15); 
            --success: #10b981;
            --danger: #ef4444;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            overflow-x: hidden; 
            user-select: none;
        }
        
        .bg-clock {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14vw; font-weight: 700;
            color: rgba(255, 255, 255, 0.08); 
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.05); 
            z-index: -2; pointer-events: none; white-space: nowrap;
        }

        .dashboard {
            display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
            gap: 40px; width: 100%; max-width: 1200px; z-index: 1; margin: 20px 0; padding-bottom: 20px;
        }

        /* SOLAR SYSTEM */
        .solar-panel { position: relative; width: 350px; height: 350px; display: flex; align-items: center; justify-content: center; max-width: 100%; }
        .sun { position: absolute; width: 60px; height: 60px; background: radial-gradient(circle, #fffbeb, #fde047, #f59e0b); border-radius: 50%; box-shadow: 0 0 50px rgba(245, 158, 11, 0.8), 0 0 100px rgba(245, 158, 11, 0.4); z-index: 2; }
        .earth-orbit-track { position: absolute; width: 300px; height: 300px; border: 1px dashed rgba(255, 255, 255, 0.15); border-radius: 50%; }
        .earth-orbit { position: absolute; width: 300px; height: 300px; border-radius: 50%; z-index: 3; }
        .earth-system { position: absolute; top: 0; left: 50%; width: 0; height: 0; }
        .earth { position: absolute; top: -12px; left: -12px; width: 24px; height: 24px; background: radial-gradient(circle at 30% 30%, #60a5fa, #2563eb, #000); border-radius: 50%; box-shadow: inset -4px -4px 8px rgba(0,0,0,0.9), 0 0 15px rgba(37, 99, 235, 0.6); z-index: 5; }
        .earth-spin { width: 100%; height: 100%; border-radius: 50%; background-image: radial-gradient(rgba(52, 211, 153, 0.5) 15%, transparent 40%); background-size: 12px 12px; }
        .moon-orbit { position: absolute; top: -30px; left: -30px; width: 60px; height: 60px; border: 1px dashed rgba(255, 255, 255, 0.2); border-radius: 50%; z-index: 4; }
        .moon { position: absolute; top: -4px; left: calc(50% - 4px); width: 8px; height: 8px; background: radial-gradient(circle at 30% 30%, #f1f5f9, #94a3b8, #000); border-radius: 50%; box-shadow: inset -2px -2px 5px rgba(0,0,0,0.9); }

        /* MAIN UI */
        .container { width: 100%; max-width: 480px; background: var(--surface); padding: 25px; border-radius: 16px; border: 1px solid var(--border); position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.8); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; }
        .session-tracker { font-size: 12px; color: var(--text-muted); }
        .message-box { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 25px; height: 18px; transition: opacity 0.5s; font-weight: 400; }
        
        .focus-display { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 30px; }
        .hg-wrapper { width: 45px; height: 75px; position: relative; }
        .hg-glass { width: 100%; height: 100%; position: absolute; top: 0; left: 0; border: 2px solid rgba(255,255,255,0.4); border-radius: 4px; clip-path: polygon(0% 0%, 100% 0%, 50% 50%, 100% 100%, 0% 100%, 50% 50%); z-index: 10; }
        .hg-top { width: 100%; height: 50%; position: absolute; top: 0; left: 0; clip-path: polygon(0 0, 100% 0, 50% 100%); overflow: hidden; }
        .hg-sand-top { width: 100%; height: 100%; background: var(--sand); transform-origin: bottom; transition: transform 1s linear; }
        .hg-bottom { width: 100%; height: 50%; position: absolute; bottom: 0; left: 0; clip-path: polygon(50% 0, 100% 100%, 0 100%); overflow: hidden; }
        .hg-sand-bottom { width: 100%; height: 100%; background: var(--sand); transform-origin: bottom; transform: scaleY(0); transition: transform 1s linear; position: absolute; bottom: 0; }
        .hg-stream { width: 2px; height: 50%; position: absolute; top: 50%; left: 50%; transform: translateX(-50%); opacity: 0; z-index: 5; }
        .running .hg-stream { opacity: 1; background-image: linear-gradient(to bottom, var(--sand) 50%, transparent 50%); background-size: 100% 8px; animation: sandFlow 0.3s linear infinite; }
        @keyframes sandFlow { from { background-position: 0 0; } to { background-position: 0 8px; } }
        .time-display { font-family: 'JetBrains Mono', monospace; font-size: 48px; font-weight: 500; color: var(--text); letter-spacing: -2px; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .active-task-banner { display: none; text-align: center; color: var(--sand); font-size: 13px; font-weight: 600; margin-bottom: 25px; letter-spacing: 0.5px; }

        .presets { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .presets button { background: rgba(255,255,255,0.05); padding: 8px 16px; font-size: 12px; border-radius: 6px; color: var(--text-muted); border: 1px solid var(--border); cursor: pointer; transition: 0.2s; font-family: inherit;}
        .presets button:hover { border-color: var(--text); color: var(--text); background: rgba(255,255,255,0.1); }
        .presets button.active { background: var(--text); color: #000; border-color: var(--text); font-weight: 600; }

        .actions { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .actions button { padding: 12px 0; font-size: 13px; cursor: pointer; border: none; border-radius: 8px; font-weight: 600; transition: 0.2s; flex: 1; min-width: 100px; font-family: inherit; }
        #startPauseBtn { background: var(--text); color: #000; box-shadow: 0 4px 15px rgba(255,255,255,0.1); }
        #installAppBtn { background: var(--success); color: #fff; display: none; } /* HIDDEN BY DEFAULT */

        #resetBtn { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
        
        .task-container { border-top: 1px solid var(--border); padding-top: 25px; }
        .task-input-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .task-input-group input { background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: var(--text); font-size: 13px; padding: 12px; border-radius: 6px; font-family: inherit; outline: none; transition: 0.2s; }
        .task-input-group input[type="text"] { flex: 10; min-width: 180px; }
        .task-input-group input[type="number"] { width: 60px; text-align: center; flex: 1; }
        .task-input-group button { padding: 10px 15px; background: rgba(255,255,255,0.1); color: var(--text); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s; flex: 1; white-space: nowrap; }
        
        .task-list { list-style: none; padding: 0; margin: 0; }
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px; border-bottom: 1px solid var(--border); transition: 0.2s; border-radius: 6px; }
        .task-item:last-child { border-bottom: none; }
        .task-item:hover { background: rgba(255,255,255,0.05); }
        .task-item.active-task { border-left: 4px solid var(--sand); padding-left: 15px; background: rgba(251, 191, 36, 0.08); }
        .task-item.completed { opacity: 0.4; }
        .task-item.completed .task-name { text-decoration: line-through; }
        .task-info { display: flex; align-items: center; gap: 15px; overflow: hidden; }
        .task-name { font-size: 14px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
        .task-time { font-size: 12px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
        .task-actions { display: flex; gap: 8px; opacity: 0.6; transition: opacity 0.2s;}
        .task-item:hover .task-actions { opacity: 1; }
        .task-actions button { background: transparent; padding: 4px; font-size: 14px; border: none; cursor: pointer; color: var(--text-muted); transition: 0.2s; }

        @media (max-width: 600px) {
            .dashboard { flex-direction: column; gap: 20px; }
            .solar-panel { width: 280px; height: 280px; margin-bottom: 10px; }
            .earth-orbit-track, .earth-orbit { width: 240px; height: 240px; }
            .sun { width: 50px; height: 50px; }
            .container { padding: 20px; width: 100%; }
            .time-display { font-size: 42px; }
            .bg-clock { font-size: 18vw; top: 15%; }
            .task-input-group input[type="text"] { flex: 1 1 100%; }
        }
    </style>
</head>
<body>

    <div class="bg-clock" id="bgClock">00:00:00</div>

    <div class="dashboard">
        <div class="solar-panel">
            <div class="sun"></div>
            <div class="earth-orbit-track"></div>
            <div class="earth-orbit" id="jsEarthOrbit">
                <div class="earth-system">
                    <div class="earth">
                        <div class="earth-spin" id="jsEarthSpin"></div>
                    </div>
                    <div class="moon-orbit" id="jsMoonOrbit">
                        <div class="moon"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="header">
                <h1>Solar Engine</h1>
                <div class="session-tracker">Score: <span id="sessionCount">0</span></div>
            </div>
            
            <div class="message-box" id="groundingMessage">The universe is moving. Keep building.</div>
            <div id="activeTaskBanner" class="active-task-banner"></div>
            
            <div class="focus-display">
                <div class="hg-wrapper" id="hourglassAnim">
                    <div class="hg-glass"></div>
                    <div class="hg-top"><div class="hg-sand-top" id="sandTop"></div></div>
                    <div class="hg-stream"></div>
                    <div class="hg-bottom"><div class="hg-sand-bottom" id="sandBottom"></div></div>
                </div>
                <div class="time-display" id="timeText">60:00</div>
            </div>
            
            <div class="presets">
                <button onclick="setPreset(25)" id="btn-25">25 Min</button>
                <button onclick="setPreset(45)" id="btn-45">45 Min</button>
                <button onclick="setPreset(60)" class="active" id="btn-60">60 Min</button>
            </div>
            
            <div class="actions">
                <button id="startPauseBtn" onclick="toggleTimer()">Start Focus</button>
                <button id="resetBtn" onclick="resetTimer()">Reset</button>
                <button id="installAppBtn" onclick="installApp()">📲 Install App</button>
            </div>

            <div class="task-container">
                <div class="task-input-group">
                    <input type="text" id="taskInput" placeholder="Enter task..." onkeypress="handleEnter(event)">
                    <input type="number" id="timeInput" placeholder="Min" min="1" max="180" onkeypress="handleEnter(event)">
                    <button onclick="addTask()">+ Add</button>
                </div>
                <ul class="task-list" id="taskList"></ul>
            </div>
        </div>
    </div>

    <script>
        // --- INSTALLATION LOGIC (PWA) ---
        let deferredPrompt;
        const installBtn = document.getElementById('installAppBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent Chrome 67 and earlier from automatically showing the prompt
            e.preventDefault();
            // Stash the event so it can be triggered later.
            deferredPrompt = e;
            // Update UI to notify the user they can add to home screen
            installBtn.style.display = 'block';
        });

        async function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.style.display = 'none';
                }
                deferredPrompt = null;
            }
        }

        // --- SOLAR SYSTEM LOGIC ---
        function updateCosmos() {
            const now = new Date();
            document.getElementById('bgClock').innerText = now.toLocaleTimeString('en-US', { hour12: false });
            const ms = now.getMilliseconds();
            const sec = now.getSeconds() + (ms / 1000);
            document.getElementById('jsEarthSpin').style.transform = `rotate(${((sec % 10) / 10) * 360}deg)`;
            document.getElementById('jsMoonOrbit').style.transform = `rotate(${((sec % 5) / 5) * 360}deg)`;
            document.getElementById('jsEarthOrbit').style.transform = `rotate(${(sec / 60) * 360}deg)`;
            requestAnimationFrame(updateCosmos);
        }
        updateCosmos();

        // --- TASK & TIMER LOGIC ---
        let totalSeconds = 3600; 
        let timeRemaining = totalSeconds;
        let timerInterval = null;
        let isRunning = false;
        let messageInterval = null;
        let currentActiveTaskId = null; 
        let tasks = JSON.parse(localStorage.getItem('solarTasks')) || [];
        
        function saveTasks() { localStorage.setItem('solarTasks', JSON.stringify(tasks)); renderTasks(); }
        function handleEnter(e) { if (e.key === 'Enter') addTask(); }

        function addTask() {
            const name = document.getElementById('taskInput').value.trim();
            const time = parseInt(document.getElementById('timeInput').value);
            if (!name || isNaN(time) || time <= 0) return;
            tasks.push({ id: Date.now(), name: name, minutes: time, completed: false });
            document.getElementById('taskInput').value = ''; document.getElementById('timeInput').value = '';
            saveTasks();
        }

        function toggleTaskComplete(id) {
            const task = tasks.find(t => t.id === id);
            if(task) { task.completed = !task.completed; saveTasks(); }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            if(currentActiveTaskId === id) clearActiveTaskUI(); 
            saveTasks();
        }

        function playTask(id, minutes) {
            if (isRunning) toggleTimer(); 
            currentActiveTaskId = id;
            const taskName = tasks.find(t => t.id === id).name;
            const banner = document.getElementById('activeTaskBanner');
            banner.style.display = 'block'; banner.innerText = `🔥 RUNNING: ${taskName}`;
            renderTasks();
            totalSeconds = minutes * 60; timeRemaining = totalSeconds;
            document.querySelectorAll('.presets button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('groundingMessage').innerText = "Clear your mind. Execute the code.";
            updateDisplay(); toggleTimer(); 
        }

        function clearActiveTaskUI() {
            currentActiveTaskId = null;
            document.getElementById('activeTaskBanner').style.display = 'none';
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `task-item ${task.completed ? 'completed' : ''} ${currentActiveTaskId === task.id ? 'active-task' : ''}`;
                li.innerHTML = `
                    <div class="task-info">
                        <span class="task-time">${task.minutes}m</span>
                        <span class="task-name">${task.name}</span>
                    </div>
                    <div class="task-actions">
                        ${!task.completed ? `<button class="btn-play" onclick="playTask(${task.id}, ${task.minutes})" title="Start">▶</button>` : ''}
                        <button class="btn-check" onclick="toggleTaskComplete(${task.id})" title="Complete">✔</button>
                        <button class="btn-del" onclick="deleteTask(${task.id})" title="Delete">✕</button>
                    </div>`;
                list.appendChild(li);
            });
        }

        const messages = [ "The universe moves forward. You should too.", "One line of code at a time.", "Focus entirely on the present.", "Breathe.", "Execute." ];
        function loadSessions() {
            const today = new Date().toDateString();
            let data = JSON.parse(localStorage.getItem('solarTracker')) || { date: '', count: 0 };
            if (data.date !== today) { data = { date: today, count: 0 }; localStorage.setItem('solarTracker', JSON.stringify(data)); }
            document.getElementById('sessionCount').innerText = data.count; return data;
        }

        function updateDisplay() {
            let m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            let s = (timeRemaining % 60).toString().padStart(2, '0');
            document.getElementById('timeText').innerText = `${m}:${s}`;
            let titlePrefix = currentActiveTaskId ? tasks.find(t => t.id === currentActiveTaskId).name : "Focus";
            document.title = isRunning ? `[${m}:${s}] ${titlePrefix}` : `Solar Engine`;
            let fillRatio = timeRemaining / totalSeconds;
            document.getElementById('sandTop').style.transform = `scaleY(${fillRatio})`;
            document.getElementById('sandBottom').style.transform = `scaleY(${1 - fillRatio})`;
        }

        function setPreset(minutes) {
            if(isRunning) return; clearActiveTaskUI(); renderTasks();
            document.querySelectorAll('.presets button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${minutes}`).classList.add('active');
            totalSeconds = minutes * 60; timeRemaining = totalSeconds; updateDisplay();
        }

        function toggleTimer() {
            const hourglass = document.getElementById('hourglassAnim');
            if (isRunning) {
                clearInterval(timerInterval); clearInterval(messageInterval);
                document.getElementById('startPauseBtn').innerText = "Resume Timer";
                hourglass.classList.remove('running');
                isRunning = false; document.title = `Paused`;
            } else {
                document.getElementById('startPauseBtn').innerText = "Pause";
                hourglass.classList.add('running');
                isRunning = true;
                changeMessage(); messageInterval = setInterval(changeMessage, 60000);
                timerInterval = setInterval(() => {
                    timeRemaining--; updateDisplay();
                    if (timeRemaining <= 0) sessionComplete();
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerInterval); clearInterval(messageInterval);
            isRunning = false; timeRemaining = totalSeconds;
            document.getElementById('hourglassAnim').classList.remove('running');
            clearActiveTaskUI(); renderTasks();
            document.getElementById('startPauseBtn').innerText = "Start Timer";
            document.getElementById('groundingMessage').innerText = "Ready.";
            updateDisplay();
        }

        function sessionComplete() {
            clearInterval(timerInterval); clearInterval(messageInterval);
            isRunning = false; document.getElementById('hourglassAnim').classList.remove('running');
            if (currentActiveTaskId) { toggleTaskComplete(currentActiveTaskId); clearActiveTaskUI(); }
            let data = loadSessions(); data.count += 1;
            localStorage.setItem('solarTracker', JSON.stringify(data));
            document.getElementById('sessionCount').innerText = data.count;
            let ctx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = ctx.createOscillator(); osc.connect(ctx.destination);
            osc.frequency.setValueAtTime(600, ctx.currentTime); osc.start(); setTimeout(() => osc.stop(), 1000);
            document.getElementById('startPauseBtn').innerText = "Start Next"; updateDisplay();
            setTimeout(() => { alert("Session complete. Take a breather."); resetTimer(); }, 500);
        }

        window.onload = () => { loadSessions(); renderTasks(); updateDisplay(); };
    </script>
</body>
</html>
